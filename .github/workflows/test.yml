name: Test

on:
  push:
    branches: [main, stage, dev]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Run unit tests
        run: |
          nix shell nixpkgs#python312 nixpkgs#uv nixpkgs#stdenv.cc.cc.lib \
            --command bash -c '
              export LD_LIBRARY_PATH=$(nix eval --raw nixpkgs#stdenv.cc.cc.lib)/lib:$LD_LIBRARY_PATH
              uv run pytest tests/unit/ -v
            '

  integration-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Run script and lib tests
        run: |
          nix shell nixpkgs#python312 nixpkgs#uv nixpkgs#stdenv.cc.cc.lib nixpkgs#shellcheck \
            --command bash -c '
              export LD_LIBRARY_PATH=$(nix eval --raw nixpkgs#stdenv.cc.cc.lib)/lib:$LD_LIBRARY_PATH
              uv run pytest tests/integration/test_lib.py tests/integration/test_scripts.py -v
            '

  integration-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Run local mode tests
        run: |
          nix shell nixpkgs#python312 nixpkgs#uv nixpkgs#stdenv.cc.cc.lib \
            --command bash -c '
              export LD_LIBRARY_PATH=$(nix eval --raw nixpkgs#stdenv.cc.cc.lib)/lib:$LD_LIBRARY_PATH
              uv run pytest tests/integration/test_local_mode.py -v
            '

  integration-devenv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Run devenv integration tests
        run: |
          nix shell nixpkgs#python312 nixpkgs#uv nixpkgs#stdenv.cc.cc.lib \
            --command bash -c '
              export LD_LIBRARY_PATH=$(nix eval --raw nixpkgs#stdenv.cc.cc.lib)/lib:$LD_LIBRARY_PATH
              uv run pytest tests/integration/test_devenv.py -v
            '
