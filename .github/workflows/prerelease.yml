name: Pre-release

on:
  push:
    branches:
      - stage

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create pre-release
        run: |
          TAG="stage-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          gh release create "$TAG" \
            --title "$TAG" \
            --prerelease \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
